name: pitch-conditioning-study
channels:
  - pytorch
  - conda-forge
dependencies:
  - python=3.11
  - pip
  - numpy
  - scipy
  - pandas
  - matplotlib
  - jupyterlab
  - ipython
  - ipykernel
  - ipywidgets
  - tensorboard
  - tqdm
  - requests
  - pyyaml
  - packaging
  - git
  - git-lfs
  - ffmpeg
  - libsndfile
  - portaudio
  - numba
  - llvmlite
  - scikit-learn
  - joblib
  - msgpack-python
  - pooch
  - pytorch
  - torchvision
  - torchaudio
  - cpuonly
variables:
  PYTHONNOUSERSITE: "1"
  PYTHONIOENCODING: "utf-8"
  PYTHONUTF8: "1"
  LANG: "en_US.UTF-8"

